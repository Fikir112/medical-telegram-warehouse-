version: 2

sources:
  - name: raw
    description: "Raw Telegram messages loaded from JSON scrape"
    schema: public
    tables:
      - name: raw_telegram_messages
        description: "One row per scraped Telegram message across all channels"
        columns:
          - name: message_id
            description: "Unique Telegram message ID"
            tests:
              - not_null
          - name: channel_name
            description: "Telegram channel username"
            tests:
              - not_null
              - accepted_values:
                  values: ['CheMed123', 'lobelia4cosmetics', 'tikvahpharma']
          - name: message_date
            description: "Timestamp of the original message"
            tests:
              - not_null